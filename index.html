<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WorkLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0b0c0e;--bg2:#13141a;--bg3:#1a1c23;--bg4:#22242d;--bg5:#2a2d38;
  --border:#252830;--border2:#303445;--border3:#3d4155;
  --text:#eceef5;--text2:#8a8fa8;--text3:#52566a;
  --accent:#4f7cff;--green:#25c17a;--amber:#f0a020;--red:#e04545;
  --font-mono:'DM Mono',monospace;--font-sans:'Noto Sans KR',sans-serif;
  --r:10px;--r2:14px;--r3:18px;--shadow:none;
}
[data-theme="light"]{
  --bg:#f0f1f5;--bg2:#fff;--bg3:#ebedf2;--bg4:#e2e4ec;--bg5:#d8dae5;
  --border:#e0e2ea;--border2:#cacde0;--border3:#b0b4cc;
  --text:#12141f;--text2:#50556e;--text3:#9096b0;
  --shadow:0 1px 4px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;overflow-x:hidden;transition:background .2s,color .2s}

/* ── Layout ── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:212px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .25s,background .2s;z-index:50}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}

/* ── Sidebar ── */
.sidebar-top{padding:22px 16px 14px}
.app-wordmark{font-family:var(--font-mono);font-size:11px;letter-spacing:3px;color:var(--accent);text-transform:uppercase}
.sidebar-date{font-size:11px;color:var(--text3);margin-top:3px}
.nav{padding:10px 8px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);transition:all .13s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left;font-family:var(--font-sans)}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg4);color:var(--text);font-weight:500}
.nav-item svg{opacity:.55;flex-shrink:0;width:14px;height:14px}
.nav-item.active svg{opacity:1}
.nav-badge{margin-left:auto;font-family:var(--font-mono);font-size:10px;background:rgba(224,69,69,.18);color:var(--red);padding:2px 6px;border-radius:999px;display:none}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.footer-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.pill-btn{font-family:var(--font-mono);font-size:10px;padding:4px 9px;border-radius:999px;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text3);transition:all .13s;letter-spacing:.5px}
.pill-btn:hover,.pill-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(79,124,255,.08)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);margin-left:auto;transition:background .3s;flex-shrink:0}
.sync-dot.syncing{background:var(--amber);animation:blink .9s infinite}
.sync-dot.offline{background:var(--red)}
.color-trigger{width:18px;height:18px;border-radius:50%;background:var(--accent);border:2px solid var(--border3);cursor:pointer;transition:transform .15s;flex-shrink:0;outline:none}
.color-trigger:hover{transform:scale(1.12)}

/* ── Topbar ── */
.topbar{padding:13px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg);position:sticky;top:0;z-index:10;transition:background .2s}
.menu-btn{display:none;background:none;border:none;cursor:pointer;color:var(--text2);padding:3px;line-height:1}
.topbar-label{font-family:var(--font-mono);font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.prog-chip{font-family:var(--font-mono);font-size:11px;background:var(--bg3);border:1px solid var(--border);padding:3px 10px;border-radius:999px;color:var(--text2)}

/* ── Panels ── */
.panel{display:none;padding:24px;animation:fadeUp .18s ease}
.panel.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.sec-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:var(--font-mono);margin-bottom:16px}

/* ── Add bar ── */
.add-bar{display:flex;gap:8px;margin-bottom:20px}
.quick-input{flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:10px 14px;color:var(--text);font-family:var(--font-sans);font-size:14px;outline:none;transition:border .15s;box-shadow:var(--shadow)}
.quick-input:focus{border-color:var(--accent)}
.quick-input::placeholder{color:var(--text3)}
.add-btn{padding:10px 16px;background:var(--accent);border:none;border-radius:var(--r);color:#fff;font-family:var(--font-sans);font-size:13px;cursor:pointer;white-space:nowrap;transition:opacity .13s,transform .1s;display:flex;align-items:center;gap:6px;flex-shrink:0}
.add-btn:hover{opacity:.85}.add-btn:active{transform:scale(.97)}

/* ── Progress ── */
.progress-section{margin-bottom:22px}
.progress-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:7px}
.progress-row span:first-child{color:var(--text2)}
.progress-row span:last-child{font-family:var(--font-mono);color:var(--accent)}
.progress-track{height:2px;background:var(--bg5);border-radius:1px}
.progress-fill{height:100%;border-radius:1px;background:var(--accent);transition:width .4s ease}

/* ── Task cards ── */
.cards-grid{display:flex;flex-direction:column;gap:8px}

.task-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;transition:border .13s,box-shadow .15s,opacity .2s,transform .15s;box-shadow:var(--shadow);position:relative;overflow:hidden;cursor:default;user-select:none}
.task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 2px 2px 0;transition:background .2s}
.task-card.pri-high::before{background:var(--red)}
.task-card.pri-med::before{background:var(--amber)}
.task-card.pri-low::before{background:var(--border3)}
.task-card:hover{border-color:var(--border2);box-shadow:0 2px 12px rgba(0,0,0,.15)}
.task-card.done{opacity:.38}
.task-card.done .card-title{text-decoration:line-through}
.task-card.dragging{opacity:.5;transform:scale(1.015);box-shadow:0 8px 30px rgba(0,0,0,.4);z-index:100;cursor:grabbing}
.task-card.drag-over{border-color:var(--accent);border-style:dashed}

.card-top{display:flex;align-items:flex-start;gap:10px}
.card-cb{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border3);background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .18s;margin-top:1px}
.task-card.done .card-cb{background:var(--green);border-color:var(--green)}
.cb-svg{opacity:0;transform:scale(0) rotate(-10deg);transition:all .2s}
.task-card.done .cb-svg{opacity:1;transform:scale(1) rotate(0)}

.card-content{flex:1;min-width:0}
.card-title{font-size:14px;color:var(--text);line-height:1.45;word-break:break-word;font-weight:400}
.card-memo{font-size:12px;color:var(--text3);margin-top:6px;line-height:1.55;padding:7px 10px;background:var(--bg3);border-radius:6px;border-left:2px solid var(--border2)}
.card-footer{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.pri-badge{font-size:10px;font-family:var(--font-mono);padding:2px 8px;border-radius:999px;flex-shrink:0}
.pri-badge.high{background:rgba(224,69,69,.14);color:var(--red);border:1px solid rgba(224,69,69,.3)}
.pri-badge.med{background:rgba(240,160,32,.12);color:var(--amber);border:1px solid rgba(240,160,32,.3)}
.pri-badge.low{background:var(--bg4);color:var(--text3);border:1px solid var(--border2)}
.due-chip{font-size:10px;font-family:var(--font-mono);padding:2px 8px;border-radius:999px;background:var(--bg4);color:var(--text3);border:1px solid var(--border2);flex-shrink:0}
.due-chip.overdue{background:rgba(224,69,69,.12);color:var(--red);border-color:rgba(224,69,69,.3)}
.due-chip.today-due{background:rgba(240,160,32,.1);color:var(--amber);border-color:rgba(240,160,32,.3)}
.card-actions{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity .13s;margin-top:1px}
.task-card:hover .card-actions{opacity:1}
.icon-btn{background:none;border:none;cursor:pointer;padding:5px;color:var(--text3);border-radius:6px;transition:all .13s;line-height:1;font-size:13px}
.icon-btn:hover{color:var(--text);background:var(--bg4)}

.drag-grip{cursor:grab;color:var(--text3);opacity:.25;transition:opacity .13s;display:flex;flex-direction:column;gap:3px;padding:4px 2px;flex-shrink:0;margin-top:1px}
.drag-grip:hover{opacity:.7}
.drag-grip:active{cursor:grabbing}
.drag-grip span{display:block;width:10px;height:1.5px;background:currentColor;border-radius:1px}

/* ── Priority filter tabs ── */
.filter-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.filter-tab{font-family:var(--font-mono);font-size:11px;padding:5px 12px;border-radius:999px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .13s;letter-spacing:.3px}
.filter-tab:hover{border-color:var(--border3);color:var(--text2)}
.filter-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(79,124,255,.1)}

/* ── Status badges ── */
.status-btn{font-size:11px;font-family:var(--font-mono);padding:3px 10px;border-radius:999px;border:1px solid var(--border2);background:transparent;cursor:pointer;transition:all .15s;white-space:nowrap}
.status-btn:hover{opacity:.8}
.status-todo{border-color:var(--border2);color:var(--text3);background:var(--bg4)}
.status-inprogress{border-color:#6080ff;color:#6080ff;background:rgba(96,128,255,.1)}
.status-review{border-color:var(--amber);color:var(--amber);background:rgba(240,160,32,.1)}
.status-done{border-color:var(--green);color:var(--green);background:rgba(37,193,122,.1)}
.task-card.status-inprogress-card::before{background:var(--accent)}
.task-card.status-review-card::before{background:var(--amber)}
.task-card.status-done-card::before{background:var(--green)}
.task-card.status-todo-card::before{background:var(--border3)}

/* ── Date picker bar ── */
.date-nav{display:flex;align-items:center;gap:8px;margin-bottom:18px}
.date-nav-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:14px;transition:all .13s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.date-nav-btn:hover{background:var(--bg4);color:var(--text)}
.date-nav-label{flex:1;text-align:center;font-family:var(--font-mono);font-size:12px;color:var(--text);cursor:pointer;padding:5px 8px;border-radius:var(--r);border:1px solid transparent;transition:all .13s}
.date-nav-label:hover{background:var(--bg3);border-color:var(--border)}
.date-nav-label.is-today{color:var(--accent)}
.date-nav-input{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;backdrop-filter:blur(4px);align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r3);width:440px;max-width:calc(100vw - 32px);max-height:90vh;overflow-y:auto;animation:modalIn .2s ease;box-shadow:0 20px 60px rgba(0,0,0,.5)}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 0}
.modal-title{font-size:14px;font-weight:500;color:var(--text)}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;line-height:1;padding:2px;transition:color .13s}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px}
.form-field{margin-bottom:16px}
.form-label{display:block;font-size:10px;font-family:var(--font-mono);color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 13px;color:var(--text);font-family:var(--font-sans);font-size:14px;outline:none;transition:border .15s}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
textarea.form-input{resize:vertical;min-height:76px;line-height:1.55}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.pri-pills{display:flex;gap:6px}
.pri-pill{flex:1;padding:8px 6px;border-radius:var(--r);border:1px solid var(--border);background:transparent;cursor:pointer;font-size:12px;font-family:var(--font-mono);transition:all .13s;text-align:center;display:flex;align-items:center;justify-content:center;gap:5px;color:var(--text3)}
.pri-pill:hover{border-color:var(--border3);color:var(--text2)}
.pri-pill.sel-high{border-color:var(--red);color:var(--red);background:rgba(224,69,69,.1)}
.pri-pill.sel-med{border-color:var(--amber);color:var(--amber);background:rgba(240,160,32,.1)}
.pri-pill.sel-low{border-color:var(--border3);color:var(--text2);background:var(--bg4)}
.pri-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-high{background:var(--red)}.dot-med{background:var(--amber)}.dot-low{background:var(--text3)}

.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:0 20px 20px}
.btn-cancel{padding:9px 16px;background:transparent;border:1px solid var(--border2);border-radius:var(--r);color:var(--text2);font-family:var(--font-sans);font-size:13px;cursor:pointer;transition:all .13s}
.btn-cancel:hover{background:var(--bg3)}
.btn-confirm{padding:9px 18px;background:var(--accent);border:none;border-radius:var(--r);color:#fff;font-family:var(--font-sans);font-size:13px;cursor:pointer;transition:opacity .13s,transform .1s;font-weight:500}
.btn-confirm:hover{opacity:.85}.btn-confirm:active{transform:scale(.97)}

/* ── AI panel ── */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:15px;text-align:center;box-shadow:var(--shadow);transition:transform .2s,border .15s}
.kpi:hover{transform:translateY(-2px);border-color:var(--border2)}
.kpi-val{font-family:var(--font-mono);font-size:22px;color:var(--text)}
.kpi-lbl{font-size:10px;color:var(--text3);font-family:var(--font-mono);margin-top:5px}
.ai-gen-btn{width:100%;padding:12px;background:var(--accent);border:none;border-radius:var(--r);color:#fff;font-family:var(--font-sans);font-size:14px;cursor:pointer;margin-bottom:10px;transition:opacity .13s;display:flex;align-items:center;justify-content:center;gap:8px}
.ai-gen-btn:hover{opacity:.85}.ai-gen-btn:disabled{opacity:.4;cursor:not-allowed}
.share-row{display:flex;gap:8px;margin-bottom:14px}
.ghost-btn{flex:1;padding:9px;border-radius:var(--r);border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--font-sans);font-size:13px;cursor:pointer;transition:all .13s}
.ghost-btn:hover{background:var(--bg3);color:var(--text)}
.ai-result{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:18px;min-height:120px;font-size:14px;line-height:1.85;color:var(--text);white-space:pre-wrap;box-shadow:var(--shadow)}
.ai-result.empty{color:var(--text3);display:flex;align-items:center;justify-content:center;font-size:13px;font-family:var(--font-mono);text-align:center}
.ai-result.loading{color:var(--text3);font-family:var(--font-mono);font-size:13px;animation:breathe 1.4s ease infinite}
@keyframes breathe{0%,100%{opacity:.35}50%{opacity:1}}

/* ── History Calendar ── */
.cal-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.cal-month-label{font-size:16px;font-weight:500;color:var(--text);letter-spacing:.3px}
.cal-nav-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:14px;transition:all .13s;display:flex;align-items:center;justify-content:center}
.cal-nav-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border3)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{font-family:var(--font-mono);font-size:10px;color:var(--text3);text-align:center;padding:0 0 10px;letter-spacing:.5px;text-transform:uppercase}
.cal-dow:first-child{color:var(--red);opacity:.7}
.cal-dow:last-child{color:var(--text3);opacity:.5}

.cal-day{min-height:52px;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:8px 4px 6px;cursor:pointer;transition:all .15s;position:relative;border:1px solid transparent;gap:4px;user-select:none}
.cal-day:hover:not(.other-month){background:var(--bg3);border-color:var(--border2)}
.cal-day.other-month{opacity:.2;pointer-events:none}
.cal-day.today{border-color:var(--accent)!important;background:rgba(79,124,255,.07)}
.cal-day.selected{background:var(--accent)!important;border-color:var(--accent)!important}
.cal-day.selected .cal-day-num{color:#fff!important;font-weight:600}
.cal-day.selected .cal-pct-bar{background:rgba(255,255,255,.25)}
.cal-day.selected .cal-pct-fill{background:#fff!important}
.cal-day.has-data{background:var(--bg3);border-color:var(--border)}
.cal-day.has-data:hover{border-color:var(--border2);background:var(--bg4)}
.cal-day-num{font-family:var(--font-mono);font-size:13px;color:var(--text2);line-height:1;pointer-events:none}
.cal-day.today .cal-day-num{color:var(--accent);font-weight:600}
.cal-day.has-data .cal-day-num{color:var(--text);font-weight:500}

/* Progress indicator inside cell */
.cal-pct-bar{width:80%;height:3px;border-radius:2px;background:var(--bg5);overflow:hidden;pointer-events:none;margin-top:auto}
.cal-pct-fill{height:100%;border-radius:2px;transition:width .3s;pointer-events:none}
.cal-done-dot{width:5px;height:5px;border-radius:50%;pointer-events:none;margin-top:1px}

/* Day detail panel */
.day-detail{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:20px;box-shadow:var(--shadow);animation:fadeUp .16s ease}
.day-detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.day-detail-date{font-size:14px;font-weight:500;color:var(--text)}
.day-detail-stats{display:flex;gap:8px;align-items:center}
.detail-kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.detail-kpi{background:var(--bg3);border-radius:var(--r);padding:10px;text-align:center}
.detail-kpi-val{font-family:var(--font-mono);font-size:18px;color:var(--text)}
.detail-kpi-lbl{font-size:10px;color:var(--text3);font-family:var(--font-mono);margin-top:3px}
.detail-section-title{font-size:10px;font-family:var(--font-mono);color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;margin-top:16px}
.detail-section-title:first-of-type{margin-top:0}
.detail-task-row{display:flex;align-items:flex-start;gap:8px;padding:8px 11px;border-radius:var(--r);background:var(--bg3);margin-bottom:4px;transition:opacity .15s}
.detail-task-row.done-task{opacity:.45}
.detail-task-row.done-task .detail-task-text{text-decoration:line-through}
.detail-task-text{flex:1;font-size:13px;color:var(--text);line-height:1.4}
.detail-task-memo{font-size:11px;color:var(--text3);margin-top:2px}
.detail-pri{font-size:10px;font-family:var(--font-mono);padding:2px 7px;border-radius:999px;flex-shrink:0;margin-top:1px}
.detail-pri.high{background:rgba(224,69,69,.12);color:var(--red);border:1px solid rgba(224,69,69,.2)}
.detail-pri.med{background:rgba(240,160,32,.1);color:var(--amber);border:1px solid rgba(240,160,32,.2)}
.detail-pri.low{background:var(--bg5);color:var(--text3);border:1px solid var(--border2)}
.detail-ai{font-size:13px;color:var(--text2);line-height:1.8;white-space:pre-wrap;background:var(--bg3);border-radius:var(--r);padding:14px;border-left:3px solid var(--accent)}
.detail-empty{font-size:13px;color:var(--text3);font-family:var(--font-mono);text-align:center;padding:28px 0}
.badge{font-size:10px;padding:3px 8px;border-radius:999px;font-family:var(--font-mono)}
.badge-green{background:rgba(37,193,122,.14);color:var(--green);border:1px solid rgba(37,193,122,.3)}
.badge-amber{background:rgba(240,160,32,.12);color:var(--amber);border:1px solid rgba(240,160,32,.3)}
.badge-red{background:rgba(224,69,69,.12);color:var(--red);border:1px solid rgba(224,69,69,.3)}

/* ── Settings ── */
.settings-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.settings-block-title{font-size:10px;font-family:var(--font-mono);color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:13px}
.sf{margin-bottom:10px}
.sf label{display:block;font-size:11px;font-family:var(--font-mono);color:var(--text3);margin-bottom:4px;letter-spacing:.5px}
.sf input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;color:var(--text);font-size:12px;font-family:var(--font-mono);outline:none;transition:border .15s}
.sf input:focus{border-color:var(--accent)}
.conn-row{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:13px;color:var(--text2)}
.data-btns{display:flex;gap:8px;flex-wrap:wrap}

/* ── Color picker ── */
.cpanel{position:fixed;left:212px;bottom:20px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:14px;z-index:300;width:200px;display:none;box-shadow:0 8px 30px rgba(0,0,0,.45)}
.cpanel.open{display:block}
.cpanel-title{font-size:10px;font-family:var(--font-mono);color:var(--text3);letter-spacing:1px;margin-bottom:10px}
.preset-row{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:10px}
.swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .13s}
.swatch:hover,.swatch.active{border-color:var(--text);transform:scale(1.12)}
.custom-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.custom-row input[type=color]{width:30px;height:26px;border:1px solid var(--border2);border-radius:4px;cursor:pointer;background:none;padding:0;flex-shrink:0}

/* ── Toast / Confetti ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:9px 16px;font-size:13px;color:var(--text);z-index:9999;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.35)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:9998;display:none}

/* ── Empty ── */
.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px;font-family:var(--font-mono)}

/* ── Overlay / Mobile ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40}
.overlay.show{display:block}
@media(max-width:640px){
  .sidebar{position:fixed;left:0;top:0;height:100vh;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .menu-btn{display:flex}
  .panel{padding:16px}
  .kpi-row{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr}
  .topbar{padding:11px 14px}
  .cpanel{left:12px;bottom:16px}
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── Routine panel ── */
.routine-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.routine-count{font-family:var(--font-mono);font-size:11px;color:var(--text3)}

.routine-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;box-shadow:var(--shadow);transition:border .13s,opacity .15s;position:relative;overflow:hidden}
.routine-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:0 2px 2px 0;opacity:.6}
.routine-card:hover{border-color:var(--border2)}
.routine-card.inactive{opacity:.45}
.routine-cards{display:flex;flex-direction:column;gap:8px}

.routine-card-top{display:flex;align-items:flex-start;gap:10px}
.routine-toggle{width:32px;height:18px;border-radius:999px;background:var(--bg5);border:1px solid var(--border2);cursor:pointer;transition:background .2s;flex-shrink:0;position:relative;margin-top:2px}
.routine-toggle.on{background:var(--accent);border-color:var(--accent)}
.routine-toggle::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.routine-toggle.on::after{transform:translateX(14px)}
.routine-body{flex:1;min-width:0}
.routine-name{font-size:14px;color:var(--text);line-height:1.4;word-break:break-word}
.routine-meta{display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap}
.day-pills{display:flex;gap:3px;flex-wrap:wrap}
.day-pill{font-family:var(--font-mono);font-size:10px;padding:2px 7px;border-radius:999px;border:1px solid var(--border2);color:var(--text3);background:var(--bg4)}
.day-pill.active-day{border-color:var(--accent);color:var(--accent);background:rgba(79,124,255,.1)}
.pri-badge-sm{font-size:10px;font-family:var(--font-mono);padding:2px 7px;border-radius:999px}
.pri-badge-sm.high{background:rgba(224,69,69,.12);color:var(--red);border:1px solid rgba(224,69,69,.3)}
.pri-badge-sm.med{background:rgba(240,160,32,.1);color:var(--amber);border:1px solid rgba(240,160,32,.3)}
.pri-badge-sm.low{background:var(--bg4);color:var(--text3);border:1px solid var(--border2)}
.routine-today-badge{font-family:var(--font-mono);font-size:10px;padding:2px 7px;border-radius:999px;background:rgba(37,193,122,.12);color:var(--green);border:1px solid rgba(37,193,122,.3)}
.routine-actions{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity .13s;margin-top:1px}
.routine-card:hover .routine-actions{opacity:1}

/* Routine modal day selector */
.day-selector{display:flex;gap:6px;flex-wrap:wrap}
.day-opt{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:12px;font-family:var(--font-mono);color:var(--text3);transition:all .13s;display:flex;align-items:center;justify-content:center}
.day-opt:hover{border-color:var(--border3);color:var(--text2)}
.day-opt.sel{border-color:var(--accent);color:var(--accent);background:rgba(79,124,255,.12)}

.sync-banner{background:rgba(37,193,122,.08);border:1px solid rgba(37,193,122,.25);border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--green);margin-bottom:16px;display:none;align-items:center;gap:8px}
.sync-banner.show{display:flex}
</style>
</head>
<body>

<canvas id="confetti"></canvas>
<div class="toast" id="toast"></div>

<!-- Color picker -->
<div class="cpanel" id="cpanel">
  <p class="cpanel-title">ACCENT</p>
  <div class="preset-row" id="preset-row"></div>
  <div class="custom-row">
    <span data-i18n="customColor">커스텀</span>
    <input type="color" id="custom-color" value="#4f7cff" oninput="setAccent(this.value)"/>
  </div>
</div>

<!-- Task Modal -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">할 일 추가</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-field">
        <label class="form-label" data-i18n="fieldTask">업무 내용</label>
        <input class="form-input" type="text" id="m-text" data-i18n-ph="taskPh" placeholder="무엇을 해야 하나요?" onkeydown="if(event.key==='Enter'&&!event.shiftKey)saveTask()"/>
      </div>
      <div class="form-field">
        <label class="form-label" data-i18n="fieldPriority">우선순위</label>
        <div class="pri-pills">
          <button class="pri-pill sel-high" data-p="high" onclick="selPri('high')"><span class="pri-dot dot-high"></span><span data-i18n="priHigh">높음</span></button>
          <button class="pri-pill" data-p="med" onclick="selPri('med')"><span class="pri-dot dot-med"></span><span data-i18n="priMed">보통</span></button>
          <button class="pri-pill" data-p="low" onclick="selPri('low')"><span class="pri-dot dot-low"></span><span data-i18n="priLow">낮음</span></button>
        </div>
      </div>
      <div class="form-field">
        <label class="form-label" data-i18n="fieldStatus">진행 상태</label>
        <div class="pri-pills" id="status-pills">
          <button class="pri-pill" data-s="todo" onclick="selStatus('todo')"><span data-i18n="statusTodo">할 일</span></button>
          <button class="pri-pill sel-med" data-s="inprogress" onclick="selStatus('inprogress')"><span data-i18n="statusInProgress">진행중</span></button>
          <button class="pri-pill" data-s="review" onclick="selStatus('review')"><span data-i18n="statusReview">검토중</span></button>
          <button class="pri-pill" data-s="done" onclick="selStatus('done')"><span data-i18n="statusDone">완료</span></button>
        </div>
      </div>
      <div class="form-field">
        <label class="form-label" data-i18n="fieldDue">마감일</label>
        <input class="form-input" type="date" id="m-due"/>
      </div>
      <div class="form-field">
        <label class="form-label" data-i18n="fieldMemo">메모</label>
        <textarea class="form-input" id="m-memo" data-i18n-ph="memoPh" placeholder="추가 메모..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()" data-i18n="btnCancel">취소</button>
      <button class="btn-confirm" onclick="saveTask()" id="modal-confirm">추가</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- Routine Modal -->
<div class="modal-bg" id="rmodal-bg" onclick="if(event.target===this)closeRModal()">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="rmodal-title">루틴 추가</span>
      <button class="modal-close" onclick="closeRModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-field">
        <label class="form-label" data-i18n="fieldRoutineName">루틴 이름</label>
        <input class="form-input" type="text" id="r-name" data-i18n-ph="routineNamePh" placeholder="매일 할 일을 입력하세요" onkeydown="if(event.key==='Enter')saveRoutine()"/>
      </div>
      <div class="form-field" style="background:var(--bg3);border-radius:var(--r);padding:10px 13px;border:1px solid var(--border)">
        <span style="font-size:12px;color:var(--text3);font-family:var(--font-mono)">📅 <span data-i18n="weekdaysOnly">월요일 ~ 금요일 자동 반복</span></span>
      </div>
      <div class="form-field">
        <label class="form-label" data-i18n="fieldPriority">우선순위</label>
        <div class="pri-pills">
          <button class="pri-pill" data-p="high" onclick="selRPri('high')"><span class="pri-dot dot-high"></span><span data-i18n="priHigh">높음</span></button>
          <button class="pri-pill sel-med" data-p="med" onclick="selRPri('med')"><span class="pri-dot dot-med"></span><span data-i18n="priMed">보통</span></button>
          <button class="pri-pill" data-p="low" onclick="selRPri('low')"><span class="pri-dot dot-low"></span><span data-i18n="priLow">낮음</span></button>
        </div>
      </div>
      <div class="form-field">
        <label class="form-label" data-i18n="fieldMemo">메모</label>
        <textarea class="form-input" id="r-memo" data-i18n-ph="memoPh" placeholder="추가 메모..." style="min-height:56px"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeRModal()" data-i18n="btnCancel">취소</button>
      <button class="btn-confirm" onclick="saveRoutine()" id="rmodal-confirm">추가</button>
    </div>
  </div>
</div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <p class="app-wordmark">WorkLog</p>
      <p class="sidebar-date" id="sidebar-date"></p>
    </div>
    <nav class="nav">
      <button class="nav-item active" onclick="switchTab('todo',this)">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 5"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span data-i18n="navTodo">오늘 할 일</span>
        <span class="nav-badge" id="nav-badge"></span>
      </button>
      <button class="nav-item" onclick="switchTab('ai',this)">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span data-i18n="navAI">AI 리포트</span>
      </button>
      <button class="nav-item" onclick="switchTab('history',this)">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><polyline points="12 7 12 12 15 15"/></svg>
        <span data-i18n="navHistory">히스토리</span>
      </button>
      <button class="nav-item" onclick="switchTab('routine',this)">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="2" rx="1"/><rect x="3" y="11" width="18" height="2" rx="1"/><rect x="3" y="18" width="18" height="2" rx="1"/><circle cx="20.5" cy="5" r="1.5" fill="currentColor" stroke="none"/><circle cx="20.5" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="20.5" cy="19" r="1.5" fill="currentColor" stroke="none"/></svg>
        <span data-i18n="navRoutine">데일리 루틴</span>
      </button>
      <button class="nav-item" onclick="switchTab('settings',this)" style="margin-top:6px">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span data-i18n="navSettings">설정</span>
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="footer-row">
        <button class="pill-btn active" id="btn-dark" onclick="setTheme('dark')">Dark</button>
        <button class="pill-btn" id="btn-light" onclick="setTheme('light')">Light</button>
        <button class="pill-btn" id="btn-lang" onclick="toggleLang()" style="margin-left:4px">EN</button>
        <div class="sync-dot" id="sync-dot"></div>
        <button class="color-trigger" id="color-trigger" onclick="toggleCPanel(event)"></button>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="topbar-label" id="topbar-label">TODO</span>
      <div class="topbar-right">
        <span class="prog-chip" id="prog-chip"></span>
      </div>
    </div>

    <!-- TODO -->
    <div id="panel-todo" class="panel active">
      <p class="sec-label" data-i18n="secTodo">오늘 할 일</p>
      <div class="date-nav">
        <button class="date-nav-btn" onclick="navDate(-1)">‹</button>
        <span class="date-nav-label" id="date-nav-label" onclick="openDatePicker()"></span>
        <input type="date" id="date-picker-input" class="date-nav-input" onchange="setActiveDate(this.value)"/>
        <button class="date-nav-btn" onclick="navDate(1)">›</button>
        <button class="date-nav-btn" id="today-jump-btn" onclick="jumpToToday()" style="width:auto;padding:0 8px;border-radius:var(--r);font-size:10px;font-family:var(--font-mono)" data-i18n="btnToday">오늘</button>
      </div>
      <div class="add-bar">
        <input class="quick-input" type="text" id="quick-input" data-i18n-ph="quickPh" placeholder="빠른 추가 (Enter) 또는 +" onkeydown="if(event.key==='Enter')quickAdd()"/>
        <button class="add-btn" onclick="openModal()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span data-i18n="btnNew">새 할 일</span>
        </button>
      </div>
      <div class="progress-section">
        <div class="progress-row"><span id="prog-text"></span><span id="prog-pct"></span></div>
        <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
      <div class="filter-tabs" id="filter-tabs"></div>
      <div class="cards-grid" id="cards-grid"></div>
    </div>

    <!-- AI -->
    <div id="panel-ai" class="panel">
      <p class="sec-label" data-i18n="secAI">AI 리포트</p>
      <div class="kpi-row" id="kpi-row"></div>
      <button class="ai-gen-btn" id="ai-btn" onclick="generateReport()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span data-i18n="btnGenReport">AI 리포트 생성</span>
      </button>
      <div class="share-row">
        <button class="ghost-btn" onclick="copyReport()" data-i18n="btnCopy">📋 복사</button>
        <button class="ghost-btn" onclick="downloadReport()" data-i18n="btnDownload">⬇ 다운로드</button>
      </div>
      <div class="ai-result empty" id="ai-result" data-i18n="aiEmpty">리포트 생성 버튼을 누르면<br>오늘 업무를 분석해드립니다</div>
    </div>

    <!-- HISTORY -->
    <div id="panel-history" class="panel">
      <p class="sec-label" data-i18n="secHistory">히스토리</p>
      <div class="cal-wrap">
        <div class="cal-header">
          <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
          <span class="cal-month-label" id="cal-month-label"></span>
          <button class="cal-nav-btn" onclick="calNav(1)">›</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
      <div id="day-detail-wrap"></div>
    </div>

    <!-- ROUTINE -->
    <div id="panel-routine" class="panel">
      <p class="sec-label" data-i18n="secRoutine">데일리 루틴</p>
      <div class="sync-banner" id="routine-sync-banner">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        <span id="routine-sync-msg"></span>
      </div>
      <div class="add-bar">

/* ══ Supabase ══ */
const SB_URL_KEY='wl_sb_url',SB_KEY_KEY='wl_sb_key';
let sb=null;
function getConfig(){ return {url:localStorage.getItem(SB_URL_KEY)||'',key:localStorage.getItem(SB_KEY_KEY)||''} }
function initSupabase(){
  const {url,key}=getConfig();
  if(url&&key){
    try{
      sb=supabase.createClient(url,key);
      setSS('syncing');
      sb.from('todos').select('id').limit(1).then(({error})=>{
        if(error){ setSS('offline'); sb=null; }
        else{ setSS('online'); syncFromSupabase(); }
      });
    }catch(e){ sb=null; setSS('offline'); }
  } else setSS('offline');
}

async function syncFromSupabase(){
  if(!sb) return;
  try{
    // Pull todos (last 60 days)
    const since=new Date(); since.setDate(since.getDate()-60);
    const sinceStr=since.toISOString().slice(0,10);
    const {data:todos,error:e1}=await sb.from('todos').select('*').gte('date',sinceStr);
    if(!e1&&todos&&todos.length){
      const grouped={};
      todos.forEach(item=>{ if(!grouped[item.date]) grouped[item.date]=[]; grouped[item.date].push(item); });
      // Merge with local — Supabase wins for any date that has remote data
      const local=load(KEY_TODOS);
      Object.keys(grouped).forEach(date=>{ local[date]=grouped[date]; });
      ls(KEY_TODOS,local);
    }
    // Pull AI reports (last 60 days)
    const {data:reports,error:e2}=await sb.from('ai_reports').select('*').gte('date',sinceStr);
    if(!e2&&reports&&reports.length){
      const aiLocal=load(KEY_AI);
      reports.forEach(r=>{ aiLocal[r.date]=r.report; });
      ls(KEY_AI,aiLocal);
    }
    // Pull routines
    const {data:routines,error:e3}=await sb.from('routines').select('*');
    if(!e3&&routines&&routines.length){
      const mapped=routines.map(r=>({...r,days:WEEKDAYS}));
      saveRoutines(mapped);
    }
    // Re-render after sync
    renderTodos(); renderFilterTabs(); renderRoutines();
    showToast(lang==='ko'?'☁️ 데이터 동기화 완료':'☁️ Synced from cloud');
  }catch(e){ console.warn('Sync error',e); }
}
function setSS(s){
  ['sync-dot','sync-dot2'].forEach(id=>{ const d=document.getElementById(id); if(d) d.className='sync-dot'+(s==='syncing'?' syncing':s==='online'?'':' offline'); });
  const cl=document.getElementById('conn-label'); if(cl) cl.textContent=t(s==='online'?'connected':s==='syncing'?'checking':'disconnected');
}

function saveConfig(){
  const url=document.getElementById('cfg-url').value.trim(),key=document.getElementById('cfg-key').value.trim();

const KEY_TODOS='wl_todos',KEY_AI='wl_ai';
function load(k){ try{ return JSON.parse(localStorage.getItem(k)||'{}') }catch(e){ return {} } }
function ls(k,v){ localStorage.setItem(k,JSON.stringify(v)) }

function getActiveDate(){ return activeDate; }

function updateDateNavLabel(){
  const el=document.getElementById('date-nav-label'); if(!el) return;
  const dt=new Date(activeDate+'T00:00:00');
  const isToday=activeDate===todayStr();
  const DOW=lang==='ko'?['일','월','화','수','목','금','토']:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const label=lang==='ko'
    ?`${dt.getMonth()+1}월 ${dt.getDate()}일 (${DOW[dt.getDay()]})`
    :`${DOW[dt.getDay()]}, ${dt.toLocaleDateString('en-AU',{month:'short',day:'numeric'})}`;
  el.textContent=isToday?(lang==='ko'?`오늘 · ${label}`:`Today · ${label}`):label;
  el.className='date-nav-label'+(isToday?' is-today':'');
  // Show/hide today jump btn
  const jb=document.getElementById('today-jump-btn'); if(jb) jb.style.display=isToday?'none':'flex';
}

function navDate(dir){
  const dt=new Date(activeDate+'T00:00:00'); dt.setDate(dt.getDate()+dir);
  activeDate=dt.toISOString().slice(0,10);

}

/* ══ Due date label ══ */
function dueDateInfo(due){
  if(!due) return null;
  const today=todayStr(),tom=new Date(); tom.setDate(tom.getDate()+1);
  const tomStr=tom.toISOString().slice(0,10);
  if(due<today) return {label:t('overdue'),cls:'overdue'};
  if(due===today) return {label:t('todayDue'),cls:'today-due'};
  if(due===tomStr) return {label:t('tomorrowDue'),cls:''};
  return {label:due,cls:''};
}

/* ══ Confetti ══ */
function fireConfetti(){
  const c=document.getElementById('confetti'); c.style.display='block'; c.width=innerWidth; c.height=innerHeight;
  const ctx=c.getContext('2d');
  const P=Array.from({length:100},()=>({ x:Math.random()*c.width,y:-10,vx:(Math.random()-.5)*7,vy:Math.random()*5+2,color:['#4f7cff','#25c17a','#f0a020','#ff5c8d','#7c5cff'][Math.floor(Math.random()*5)],s:Math.random()*8+3,r:Math.random()*360,rv:(Math.random()-.5)*9 }));
  let f=0;
  (function draw(){ ctx.clearRect(0,0,c.width,c.height); P.forEach(p=>{ p.x+=p.vx;p.y+=p.vy;p.vy+=.09;p.r+=p.rv; ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s);ctx.restore(); }); f++;if(f<115) requestAnimationFrame(draw); else c.style.display='none'; })();
}
function haptic(type='light'){ if(navigator.vibrate) navigator.vibrate(type==='success'?[20,30,50]:20); }

function openModal(ei=null){
  editIdx=ei;
  document.getElementById('modal-title').textContent=t(ei!=null?'modalEdit':'modalAdd');
  document.getElementById('modal-confirm').textContent=t(ei!=null?'btnSave':'btnAdd');
  if(ei!=null){

    document.getElementById('m-due').value=item.due||'';
    document.getElementById('m-memo').value=item.memo||'';

  } else {
    document.getElementById('m-text').value=document.getElementById('quick-input').value||'';
    document.getElementById('m-due').value='';

function selPri(p){

}
function selStatus(s){
  selStatusVal=s;
  const styleMap={todo:'sel-high',inprogress:'sel-med',review:'sel-med',done:'sel-low'};
  document.querySelectorAll('#status-pills .pri-pill').forEach(btn=>{
    const bs=btn.dataset.s;
    btn.className='pri-pill'+(bs===s?' '+styleMap[s]:'');
  });
}
async function saveTask(){
  const text=document.getElementById('m-text').value.trim(); if(!text) return;
  const date=getActiveDate(), list=getTodos(date);
  const item={text,priority:selPriVal,status:selStatusVal,due:document.getElementById('m-due').value||null,memo:document.getElementById('m-memo').value.trim()||null,done:selStatusVal==='done',date,created_at:new Date().toISOString()};
  if(editIdx!=null){ const old=list[editIdx]; item.created_at=old.created_at; list[editIdx]=item; }
  else list.push(item);
  saveTodosLocal(date,list); closeModal(); haptic(); renderTodos();
  if(sb) sb.from('todos')[editIdx!=null?'update':'insert'](editIdx!=null?[item]:[item]).then(()=>{});
}
async function quickAdd(){
  const inp=document.getElementById('quick-input');
  if(!inp.value.trim()){ openModal(); return; }
  const date=getActiveDate(), list=getTodos(date);
  const item={text:inp.value.trim(),priority:'med',status:'todo',due:null,memo:null,done:false,date,created_at:new Date().toISOString()};
  list.push(item); saveTodosLocal(date,list); inp.value=''; haptic(); renderTodos();
  if(sb) sb.from('todos').insert([item]);
}
async function cycleStatus(i){
  const date=getActiveDate(), list=getTodos(date);
  const cycle=['todo','inprogress','review','done'];
  const cur=list[i].status||'todo';
  const next=cycle[(cycle.indexOf(cur)+1)%cycle.length];
  list[i].status=next; list[i].done=next==='done';
  saveTodosLocal(date,list); haptic(next==='done'?'success':'light');
  renderTodos();

async function toggleTodo(i){

async function deleteTodo(i){

/* ══ Render cards ══ */
const PRI_ORDER={high:0,med:1,low:2};
let dragSrc=null;

function renderTodos(){
  const date=getActiveDate(), raw=getTodos(date);
  const el=document.getElementById('cards-grid'); el.innerHTML='';

  const STATUS_ORDER={inprogress:0,review:1,todo:2,done:3};
  const undone=raw.map((item,i)=>({...item,_i:i})).filter(x=>!x.done)
    .sort((a,b)=>{
      const so=(STATUS_ORDER[a.status||'todo']??2)-(STATUS_ORDER[b.status||'todo']??2);
      if(so!==0) return so;
      return (PRI_ORDER[a.priority]??1)-(PRI_ORDER[b.priority]??1);
    });
  const done=raw.map((item,i)=>({...item,_i:i})).filter(x=>x.done);
  let sorted=[...undone,...done];

  if(activeFilter!=='all') sorted=sorted.filter(x=>x.priority===activeFilter||x.done);

  if(!sorted.length){
    el.innerHTML=`<div class="empty">${activeFilter!=='all'?t('emptyFilter'):t('emptyTodo')}</div>`;
    updateProgress(raw); return;
  }

  const statusLabel={todo:t('statusTodo'),inprogress:t('statusInProgress'),review:t('statusReview'),done:t('statusDone')};
  const statusCls={todo:'status-todo',inprogress:'status-inprogress',review:'status-review',done:'status-done'};
  const cardStatusCls={todo:'status-todo-card',inprogress:'status-inprogress-card',review:'status-review-card',done:'status-done-card'};

  sorted.forEach(item=>{
    const i=item._i;
    const status=item.status||(item.done?'done':'todo');
    const card=document.createElement('div');
    card.className=`task-card pri-${item.priority||'med'} ${cardStatusCls[status]}${item.done?' done':''}`;
    card.draggable=true; card.dataset.idx=i;

    card.addEventListener('dragstart',e=>{ dragSrc=i; card.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    card.addEventListener('dragend',()=>{ card.classList.remove('dragging'); document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over')); });
    card.addEventListener('dragover',e=>{ e.preventDefault(); card.classList.add('drag-over'); });
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{ e.preventDefault(); card.classList.remove('drag-over'); if(dragSrc===null||dragSrc===i) return; const d=getActiveDate(),l=getTodos(d); const [mv]=l.splice(dragSrc,1); l.splice(i,0,mv); saveTodosLocal(d,l); haptic(); renderTodos(); dragSrc=null; });

    const due=dueDateInfo(item.due);
    const priLabel=t('pri'+item.priority.charAt(0).toUpperCase()+item.priority.slice(1));
    const memoHtml=item.memo?`<div class="card-memo">${escHtml(item.memo)}</div>`:'';
    const dueHtml=due?`<span class="due-chip${due.cls?' '+due.cls:''}">${due.label}</span>`:'';

    card.innerHTML=`
      <div class="card-top">
        <div class="drag-grip"><span></span><span></span><span></span></div>
        <div class="card-cb" onclick="toggleTodo(${i})">
          <svg class="cb-svg" width="10" height="10" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="card-content">
          <div class="card-title">${escHtml(item.text)}</div>
          ${memoHtml}
          <div class="card-footer">
            <button class="status-btn ${statusCls[status]}" onclick="event.stopPropagation();cycleStatus(${i})">${statusLabel[status]}</button>
            <span class="pri-badge ${item.priority||'med'}">${priLabel}</span>
            ${dueHtml}
          </div>
        </div>
        <div class="card-actions">
          <button class="icon-btn" onclick="openModal(${i})" title="Edit">✎</button>
          <button class="icon-btn" onclick="deleteTodo(${i})" title="Delete">×</button>
        </div>
      </div>`;
    el.appendChild(card);
  });
  updateProgress(raw);
}

function updateProgress(raw){
  const done=raw.filter(x=>x.done).length, total=raw.length, pct=total?Math.round(done/total*100):0;
  const inprog=raw.filter(x=>!x.done&&(x.status==='inprogress')).length;
  document.getElementById('prog-text').textContent=`${done} / ${total} ${t('progLabel')}`;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-chip').textContent=total?`${done}/${total}`:'';
  const badge=document.getElementById('nav-badge'), pending=total-done;
  badge.textContent=pending||''; badge.style.display=pending?'flex':'none';
}

async function generateReport(){
  const date=todayStr(), todos=getTodos(date);
  const done=todos.filter(t=>t.done), undone=todos.filter(t=>!t.done);
  const priIcon=p=>p==='high'?' ❗':p==='low'?' (낮음)':'';
  const line=item=>`- ${item.text}${priIcon(item.priority)}${item.due?' (마감:'+item.due+')':''}${item.memo?' — '+item.memo:''}`;
  const isKo=lang==='ko';
  const prompt=isKo
    ?`오늘(${date}) 업무 현황:\n\n완료 (${done.length}개):\n${done.map(line).join('\n')||'없음'}\n\n미완료 (${undone.length}개):\n${undone.map(line).join('\n')||'없음'}\n\n한국어로 간결한 일일 업무 리포트를 작성해주세요.\n구성: ✅ 잘한 점 / ⚠️ 미완료 / 🎯 내일 우선순위 3가지\n각 섹션 2~3줄.`
    :`Today's summary (${date}):\n\nDone (${done.length}):\n${done.map(line).join('\n')||'None'}\n\nPending (${undone.length}):\n${undone.map(line).join('\n')||'None'}\n\nWrite a concise daily report in English.\nFormat: ✅ Highlights / ⚠️ Incomplete / 🎯 Top 3 for tomorrow\n2-3 lines per section.`;
  const edgeUrl=localStorage.getItem('wl_edge_url')||'';
  const btn=document.getElementById('ai-btn'), res=document.getElementById('ai-result');
  if(!edgeUrl){
    res.className='ai-result';
    res.textContent=lang==='ko'?'설정 탭에서 Edge Function URL을 먼저 입력해주세요':'Please enter your Edge Function URL in Settings first';
    return;
  }
  btn.disabled=true; res.className='ai-result loading'; res.textContent=t('aiLoading');
  try{
    const r=await fetch(edgeUrl,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt})
    });
    const data=await r.json();
    if(!r.ok||data.error) throw new Error(data.error||'Error');
    const text=data.text||t('aiError');
    res.className='ai-result'; res.textContent=text;
    const ai=load(KEY_AI); ai[date]=text; ls(KEY_AI,ai);
    if(sb) sb.from('ai_reports').upsert([{date,report:text}]);
  }catch(e){ res.className='ai-result'; res.textContent=t('aiError'); }
  btn.disabled=false;
}

function downloadReport(){ const txt=document.getElementById('ai-result').textContent; if(!txt) return; const a=document.createElement('a'); a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(txt); a.download=`worklog_${todayStr()}.txt`; a.click(); }

/* ══ History Calendar ══ */
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();
let selectedDate=null;

function calNav(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}

function renderCalendar(){
  const DOW_KO=['일','월','화','수','목','금','토'];
  const DOW_EN=['Su','Mo','Tu','We','Th','Fr','Sa'];
  const dows=lang==='ko'?DOW_KO:DOW_EN;
  const MONTHS_KO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const MONTHS_EN=['January','February','March','April','May','June','July','August','September','October','November','December'];

  const label=lang==='ko'?`${calYear}년 ${MONTHS_KO[calMonth]}`:`${MONTHS_EN[calMonth]} ${calYear}`;
  document.getElementById('cal-month-label').textContent=label;

  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';

  dows.forEach(d=>{
    const el=document.createElement('div'); el.className='cal-dow'; el.textContent=d; grid.appendChild(el);
  });

  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();
  const todayISO=todayStr();
  const allTodos=load(KEY_TODOS);
  const allAI=load(KEY_AI);

  for(let i=firstDay-1;i>=0;i--){
    const el=document.createElement('div'); el.className='cal-day other-month';
    el.innerHTML=`<span class="cal-day-num" style="pointer-events:none">${daysInPrev-i}</span>`;
    grid.appendChild(el);
  }

  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const todos=allTodos[dateStr]||[];
    const hasData=todos.length>0||!!allAI[dateStr];
    const done=todos.filter(x=>x.done).length, total=todos.length;
    const pct=total?Math.round(done/total*100):0;
    const isToday=dateStr===todayISO;
    const isSel=dateStr===selectedDate;

    const el=document.createElement('div');
    el.className='cal-day'+(hasData?' has-data':'')+(isToday?' today':'')+(isSel?' selected':'');

    const barColor=pct===100?'var(--green)':pct>=60?'var(--amber)':'var(--red)';
    const barFill=isSel?'#fff':barColor;
    const barHtml=hasData?`<div class="cal-pct-bar"><div class="cal-pct-fill" style="width:${pct}%;background:${barFill}"></div></div>`:'';

    el.innerHTML=`<span class="cal-day-num" style="pointer-events:none">${d}</span>${barHtml}`;
    el.addEventListener('click',()=>selectDay(dateStr,el));
    grid.appendChild(el);
  }

  const filled=firstDay+daysInMonth;
  const remaining=(7-filled%7)%7;
  for(let d=1;d<=remaining;d++){
    const el=document.createElement('div'); el.className='cal-day other-month';
    el.innerHTML=`<span class="cal-day-num" style="pointer-events:none">${d}</span>`;
    grid.appendChild(el);
  }

  if(selectedDate) renderDayDetail(selectedDate);
}

function selectDay(dateStr,el){
  if(selectedDate===dateStr){
    selectedDate=null;
    document.getElementById('day-detail-wrap').innerHTML='';
    document.querySelectorAll('.cal-day.selected').forEach(d=>{ d.classList.remove('selected'); const f=d.querySelector('.cal-pct-fill'); if(f){ const p=parseInt(f.style.width); f.style.background=p===100?'var(--green)':p>=60?'var(--amber)':'var(--red)'; } });
    return;
  }
  selectedDate=dateStr;
  document.querySelectorAll('.cal-day.selected').forEach(d=>{ d.classList.remove('selected'); const f=d.querySelector('.cal-pct-fill'); if(f){ const p=parseInt(f.style.width); f.style.background=p===100?'var(--green)':p>=60?'var(--amber)':'var(--red)'; } });
  el.classList.add('selected');
  const fill=el.querySelector('.cal-pct-fill'); if(fill) fill.style.background='#fff';
  renderDayDetail(dateStr);
  setTimeout(()=>document.getElementById('day-detail-wrap').scrollIntoView({behavior:'smooth',block:'nearest'}),60);
}

      <div class="detail-kpi"><div class="detail-kpi-val">${total-done}</div><div class="detail-kpi-lbl">${lang==='ko'?'미완료':'Pending'}</div></div>
      <div class="detail-kpi"><div class="detail-kpi-val">${total?pct+'%':'—'}</div><div class="detail-kpi-lbl">${lang==='ko'?'달성률':'Rate'}</div></div>
    </div>
    ${todos.length?`<p class="detail-section-title">${lang==='ko'?'업무 목록':'Tasks'}</p>${taskRows}`:''}
    ${ai?`<p class="detail-section-title">${lang==='ko'?'AI 리포트':'AI Report'}</p><div class="detail-ai">${escHtml(ai)}</div>`:''}
  </div>`;
}

/* ══ ROUTINE ══ */
const KEY_ROUTINES='wl_routines';
const KEY_ROUTINE_APPLIED='wl_routine_applied';
const WEEKDAYS=[1,2,3,4,5]; // Mon–Fri fixed
function getRoutines(){ return JSON.parse(localStorage.getItem(KEY_ROUTINES)||'[]') }
function saveRoutines(list){ localStorage.setItem(KEY_ROUTINES,JSON.stringify(list)) }

let rEditIdx=null, selRPriVal='med';

function openRModal(ei=null){
  rEditIdx=ei;
  document.getElementById('rmodal-title').textContent=t(ei!=null?'rmodalEdit':'rmodalAdd');
  document.getElementById('rmodal-confirm').textContent=t(ei!=null?'btnSave':'btnAdd');

function closeRModal(){ document.getElementById('rmodal-bg').classList.remove('open'); document.getElementById('r-quick').value=''; }
function selRPri(p){

function saveRoutine(){

function quickRoutine(){

function toggleRoutineActive(i){

function applyRoutinesToday(manual=false){
  const date=getActiveDate(), dow=new Date(date+'T00:00:00').getDay();
  const isWeekday=dow>=1&&dow<=5;
  if(!isWeekday){ if(manual) showToast(lang==='ko'?'오늘은 주말이라 루틴이 적용되지 않아요':'No routines on weekends'); return; }

  const applied=JSON.parse(localStorage.getItem(KEY_ROUTINE_APPLIED)||'[]');
  if(!manual&&applied.includes(date)) return;

  const routines=getRoutines().filter(r=>r.active);
  if(!routines.length){ if(manual) showToast(t('routineAlready')); return; }

  const existing=getTodos(date);
  const existingKeys=new Set(existing.map(t=>t.routineId||''));
  let added=0;
  routines.forEach(r=>{
    if(existingKeys.has(r.id)) return;
    existing.push({text:r.name,priority:r.priority,due:null,memo:r.memo||null,done:false,date,routineId:r.id,created_at:new Date().toISOString()});
    added++;
  });
  if(added>0){
    saveTodosLocal(date,existing);
    if(!applied.includes(date)){ applied.push(date); localStorage.setItem(KEY_ROUTINE_APPLIED,JSON.stringify(applied.slice(-30))); }
    renderTodos();
    const msg=added+t('routineApplied');
    if(manual){ showToast(msg); }
    else { const b=document.getElementById('routine-sync-banner'),m=document.getElementById('routine-sync-msg'); if(b&&m){ m.textContent=msg; b.classList.add('show'); setTimeout(()=>b.classList.remove('show'),4000); } }
  } else if(manual){
    showToast(t('routineAlready'));
  }
}

/* ══ Utils ══ */
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function exportData(){ const a=document.createElement('a'); a.href='data:application/json,'+encodeURIComponent(JSON.stringify({todos:load(KEY_TODOS),ai:load(KEY_AI),routines:getRoutines()},null,2)); a.download=`worklog_${todayStr()}.json`; a.click(); }
function clearLocal(){ if(confirm(t('confirmClear'))){ [KEY_TODOS,KEY_AI,KEY_ROUTINES,KEY_ROUTINE_APPLIED].forEach(k=>localStorage.removeItem(k)); renderTodos(); renderRoutines(); showToast('Done'); } }

/* ══ Init ══ */
buildPresets();
setTheme(localStorage.getItem('wl_theme')||'dark');
const acc=localStorage.getItem('wl_accent'); if(acc) setAccent(acc);
initDates(); initSupabase();
applyLang(); renderFilterTabs(); renderTodos(); updateDateNavLabel();
applyRoutinesToday(false); // auto-apply on load
const {url,key}=getConfig();
if(url) document.getElementById('cfg-url').value=url;
if(key) document.getElementById('cfg-key').value=key;
</script>
</body>
